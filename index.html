<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Highest Grossing Films</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Highest Grossing Films</h1>

<div class="container">
    <div class="left-column">
        <input type="text" id="search" placeholder="Search film...">

        <table>
            <thead>
            <tr>
                <th>Title</th>
                <th>Year</th>
                <th>Director</th>
                <th>Box Office</th>
                <th>Country</th>
            </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="right-column">
        <div class="stats-header">
            <h2>Statistics</h2>
        </div>
        <canvas id="filmsChart" width="400" height="200"></canvas>
        <canvas id="revenueChart" width="400" height="200"></canvas>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span id="close">&times;</span>

        <h2 id="modalTitle"></h2>
        <p><strong>Rank:</strong> <span id="modalRank"></span></p>
        <p><strong>Year:</strong> <span id="modalYear"></span></p>
        <p><strong>Director:</strong> <span id="modalDirector"></span></p>
        <p><strong>Country:</strong> <span id="modalCountry"></span></p>
        <p><strong>Box Office:</strong> <span id="modalBox"></span></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
